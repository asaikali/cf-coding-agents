---
applications:
- name: agent-issue
  path: ./agent
  no-route: true
  buildpacks:
    - https://github.com/cloudfoundry/apt-buildpack
    - python_buildpack
  health-check-type: none
  services:
    - anthropic-creds
    - github-creds
  env:
    TARGET_REPO: asaikali/spring-petclinic
  processes:
    - type: web
      command: sleep infinity
      instances: 0
    - type: task
      command: uv run python agent.py
      memory: 2G
      disk_quota: 8G
