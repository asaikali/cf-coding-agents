---
applications:
- name: agent-py
  path: ./agent
  no-route: true
  buildpacks:
    - https://github.com/cloudfoundry/apt-buildpack
    - python_buildpack
  memory: 1G
  disk_quota: 2G
  health-check-type: none
  services:
    - anthropic-creds
    - github-creds
  processes:
    - type: web
      command: sleep infinity
      instances: 0
    - type: task
      command: uv run python agent.py "hello"
