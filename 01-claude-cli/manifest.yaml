---
applications:
- name: agent-cli
  path: ./agent
  no-route: true
  buildpacks:
    - https://github.com/cloudfoundry/apt-buildpack
    - binary_buildpack
  memory: 1G
  disk_quota: 4G
  health-check-type: none
  services:
    - anthropic-creds
    - github-creds
  processes:
    - type: web
      command: sleep infinity
      instances: 0
    - type: task
      command: ./bin/claude -p "hello" < /dev/null
